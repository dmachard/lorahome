<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - LoRa Home Gateway</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <div>
        <h1>LoRa Home Gateway</h1>
        <div class="header-status-bar">
          <span class="status-pill" id="gw-nodes-pill"><span class="pill-dot"></span>-- Nodes</span>
          <span class="status-pill" id="gw-uptime-pill">Up: --</span>
          <span class="status-pill" id="gw-wifi-pill">WiFi: --</span>
        </div>
      </div>
      <div class="header-actions">
        <a href="/metrics" class="btn-metrics" id="btn-metrics">Prometheus Metrics</a>
        <a href="/admin" class="btn">Administration →</a>
      </div>
    </header>

    <!-- Dashboard -->
    <div id="tab-dashboard" class="tab-content active">

      <div class="grid" id="nodes-container">
        <div class="stat-card scanning-card">
          <div class="radio-scanner">
            <svg class="radio-tower-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path class="wave wave-1" d="M16.24 7.76a6 6 0 0 1 0 8.49"/>
              <path class="wave wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path class="wave wave-1" d="M7.76 16.24a6 6 0 0 1 0-8.49"/>
              <path class="wave wave-2" d="M4.93 19.07a10 10 0 0 1 0-14.14"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <circle cx="12" cy="12" r="2"/>
            </svg>
          </div>
          <div class="scanning-text">
            Searching for LoRa signals
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const nodesContainer = document.getElementById('nodes-container');

    const getRssiIcon = (rssi) => {
      let color = '#ef4444';
      let activeBars = 1;
      if (rssi >= -80) {
        color = '#10b981';
        activeBars = 3;
      } else if (rssi >= -105) {
        color = '#f59e0b';
        activeBars = 2;
      }
      return `
        <svg class="node-radio-icon" style="color: ${color};" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 20v-4" style="opacity: ${activeBars >= 1 ? 1 : 0.3}" />
          <path d="M12 20v-8" style="opacity: ${activeBars >= 2 ? 1 : 0.3}" />
          <path d="M18 20V4" style="opacity: ${activeBars >= 3 ? 1 : 0.3}" />
        </svg>`;
    };

    const getSnrIcon = (snr) => {
      let color = '#64748b';
      if (snr !== undefined) {
        if (snr >= 7) color = '#10b981';
        else if (snr >= 0) color = '#f59e0b';
        else color = '#ef4444';
      }
      return `
        <svg class="node-radio-icon" style="color: ${color};" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 10h3l2.5-6 3.5 12 2.5-9 2.5 7h3l2.5-4 1.5 2h2" />
        </svg>`;
    };

    const getRssiLabelClass = (rssi) => {
      if (rssi >= -80) return 'strong';
      if (rssi >= -105) return 'medium';
      return 'weak';
    };

    const getRssiLabelText = (rssi) => {
      if (rssi >= -80) return 'Strong';
      if (rssi >= -105) return 'Medium';
      return 'Weak';
    };

    const getSnrLabelClass = (snr) => {
      if (snr === undefined) return 'poor';
      if (snr >= 7) return 'clean';
      if (snr >= 0) return 'noisy';
      return 'poor';
    };

    const getSnrLabelText = (snr) => {
      if (snr === undefined) return '--';
      if (snr >= 7) return 'Clean';
      if (snr >= 0) return 'Noisy';
      return 'Poor';
    };
    const getResetReasonLabel = (reason) => {
      switch (reason) {
        case 1: return 'PowerOn';
        case 2: return 'ExtPin';
        case 3: return 'Software';
        case 4: return 'Panic';
        case 5: return 'Watchdog';
        case 6: return 'Brownout';
        default: return 'Unknown';
      }
    };

    const getResetReasonColor = (reason) => {
      switch (reason) {
        case 1: // PowerOn
        case 3: // Software
          return '#94a3b8'; // subtle silver/gray
        case 2: // ExtPin
          return '#fbbf24'; // warning/amber
        case 4: // Panic
        case 5: // Watchdog
        case 6: // Brownout
          return '#f87171'; // danger/red
        default:
          return '#64748b';
      }
    };
    const formatUptime = (seconds) => {
      const d = Math.floor(seconds / (3600 * 24));
      const h = Math.floor((seconds % (3600 * 24)) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      let res = '';
      if (d > 0) res += d + 'd ';
      if (h > 0 || d > 0) res += h + 'h ';
      if (m > 0 || h > 0 || d > 0) res += m + 'm ';
      res += s + 's';
      return res;
    };

    const updateData = async () => {
      try {
        const response = await fetch('/api/nodes');
        const data = await response.json();

        // Header Status Pills
        if (data.gateway && data.gateway.uptime_sec !== undefined) {
          const uptimeEl = document.getElementById('gw-uptime-pill');
          if (uptimeEl) uptimeEl.innerText = 'Up: ' + formatUptime(data.gateway.uptime_sec);

          const wifiEl = document.getElementById('gw-wifi-pill');
          if (wifiEl) wifiEl.innerText = 'WiFi: ' + data.gateway.wifi_rssi + ' dBm';
        }

        const onlineCount = data.nodes ? data.nodes.filter(n => n.elapsed_sec < (n.tx_interval || 60) * 2.5).length : 0;
        const totalCount = data.nodes ? data.nodes.length : 0;
        const nodesEl = document.getElementById('gw-nodes-pill');
        if (nodesEl) {
          const dotColor = onlineCount > 0 ? '#10b981' : '#ef4444';
          nodesEl.innerHTML = `<span class="pill-dot" style="background:${dotColor}; box-shadow:0 0 8px ${dotColor}"></span>${onlineCount}/${totalCount} Nodes`;
        }

        if (!data.nodes || data.nodes.length === 0) {
          nodesContainer.innerHTML = `
            <div class="stat-card scanning-card">
              <div class="radio-scanner">
                <svg class="radio-tower-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path class="wave wave-1" d="M16.24 7.76a6 6 0 0 1 0 8.49"/>
                  <path class="wave wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                  <path class="wave wave-1" d="M7.76 16.24a6 6 0 0 1 0-8.49"/>
                  <path class="wave wave-2" d="M4.93 19.07a10 10 0 0 1 0-14.14"/>
                  <line x1="12" y1="12" x2="12" y2="21"/>
                  <circle cx="12" cy="12" r="2"/>
                </svg>
              </div>
              <div class="scanning-text">
                Searching for LoRa signals
              </div>
            </div>`;
          return;
        }

        // Remove scanning indicator if nodes are present
        const scanningCard = nodesContainer.querySelector('.scanning-card');
        if (scanningCard) {
          nodesContainer.innerHTML = '';
        }

        const themes = [
          { // Violet
            primary: '#a78bfa',
            border: 'rgba(139, 92, 246, 0.35)',
            hoverBorder: 'rgba(139, 92, 246, 0.65)',
            glow: 'rgba(139, 92, 246, 0.25)',
            badgeBg: 'rgba(139, 92, 246, 0.15)',
            badgeText: '#c084fc',
            badgeBorder: 'rgba(139, 92, 246, 0.4)'
          },
          { // Sky Blue
            primary: '#38bdf8',
            border: 'rgba(14, 165, 233, 0.35)',
            hoverBorder: 'rgba(14, 165, 233, 0.65)',
            glow: 'rgba(14, 165, 233, 0.25)',
            badgeBg: 'rgba(14, 165, 233, 0.15)',
            badgeText: '#38bdf8',
            badgeBorder: 'rgba(14, 165, 233, 0.4)'
          },
          { // Amber
            primary: '#fbbf24',
            border: 'rgba(245, 158, 11, 0.35)',
            hoverBorder: 'rgba(245, 158, 11, 0.65)',
            glow: 'rgba(245, 158, 11, 0.25)',
            badgeBg: 'rgba(245, 158, 11, 0.15)',
            badgeText: '#fbbf24',
            badgeBorder: 'rgba(245, 158, 11, 0.4)'
          },
          { // Emerald
            primary: '#34d399',
            border: 'rgba(16, 185, 129, 0.35)',
            hoverBorder: 'rgba(16, 185, 129, 0.65)',
            glow: 'rgba(16, 185, 129, 0.25)',
            badgeBg: 'rgba(16, 185, 129, 0.15)',
            badgeText: '#34d399',
            badgeBorder: 'rgba(16, 185, 129, 0.4)'
          },
          { // Rose
            primary: '#fb7185',
            border: 'rgba(244, 63, 94, 0.35)',
            hoverBorder: 'rgba(244, 63, 94, 0.65)',
            glow: 'rgba(244, 63, 94, 0.25)',
            badgeBg: 'rgba(244, 63, 94, 0.15)',
            badgeText: '#fb7185',
            badgeBorder: 'rgba(244, 63, 94, 0.4)'
          }
        ];

        data.nodes.forEach(node => {
          // Dynamic timeouts based on node's configured tx_interval (in seconds)
          const interval = node.tx_interval || 60; // Default fallback to 60s if not set yet
          const offlineThreshold = interval * 2.5;
          const hideThreshold = interval * 5;

          const cardId = `node-card-${node.id}`;
          let existingCard = document.getElementById(cardId);

          if (node.elapsed_sec >= hideThreshold) {
            if (existingCard) existingCard.remove();
            return; // Hide node if inactive for too long
          }

          const isOnline = node.elapsed_sec < offlineThreshold;
          const statusClass = isOnline ? '' : 'offline';
          const lastSeenText = isOnline ? node.elapsed_sec + 's ago' : formatUptime(node.elapsed_sec) + ' ago';

          let dotClass = '';
          if (node.elapsed_sec < interval * 1.2) {
            dotClass = ''; // green (on time / normal)
          } else if (node.elapsed_sec < offlineThreshold) {
            dotClass = 'warning'; // orange (warning / missed a packet)
          } else {
            dotClass = 'offline'; // red (offline / critical silence)
          }

          const theme = themes[(node.id || 0) % themes.length];

          let readingsHtml = '';
          if (node.readings && node.readings.length > 0) {
            node.readings.forEach(r => {
              let label = r.label || r.name || 'Sensor';
              let value = r.value;
              let unit = r.unit || '';
              let iconClass = 'temp';
              let iconSvg = '<path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>';

              const nameLower = (r.name || '').toLowerCase();
              if (nameLower.includes('humidity')) {
                iconClass = 'hum';
                iconSvg = '<path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"/>';
              } else if (nameLower.includes('pressure')) {
                iconClass = 'press';
                iconSvg = '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l3 3"/>';
              } else if (nameLower.includes('light') || nameLower.includes('lux')) {
                iconClass = 'light';
                iconSvg = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
              } else if (nameLower.includes('voltage') || nameLower.includes('volt')) {
                iconClass = 'volt';
                iconSvg = '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>';
              } else if (nameLower.includes('current') || nameLower.includes('amp')) {
                iconClass = 'curr';
                iconSvg = '<circle cx="12" cy="12" r="10"/><path d="M12 6v12M8 12h8"/>';
              } else if (nameLower.includes('power') || nameLower.includes('watt')) {
                iconClass = 'power';
                iconSvg = '<path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/>';
              } else if (nameLower.includes('co2')) {
                iconClass = 'co2';
                iconSvg = '<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>';
              }

              let displayVal = typeof value === 'number' ? (Number.isInteger(value) ? value : value.toFixed(1)) : value;

              readingsHtml += `
                <div class="metric-item">
                  <div class="metric-value-wrapper">
                    <svg class="metric-icon ${iconClass}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${iconSvg}</svg>
                    <span class="metric-value">${displayVal}<span class="metric-unit">${unit}</span></span>
                  </div>
                  <span class="metric-label">${label}</span>
                </div>`;
            });
          }

          const lostCount = node.packets_lost || 0;
          const totalPackets = (node.packets_count || 0) + lostCount;
          const lossPercent = totalPackets > 0 ? (lostCount * 100) / totalPackets : 0;
          const lossPercentStr = lossPercent.toFixed(1).replace('.', ',');

          let lossColor = '#34d399'; // 🟢 < 1%
          if (lossPercent > 5) {
            lossColor = '#ef4444'; // 🔴 > 5%
          } else if (lossPercent >= 1) {
            lossColor = '#fbbf24'; // 🟡 1–5%
          }

          const cardInnerHtml = `
              <div class="node-header">
                <div class="node-title-group">
                  <span class="node-name" style="color: ${isOnline ? theme.primary : '#94a3b8'}; text-shadow: 0 0 10px ${isOnline ? theme.glow : 'transparent'};">${node.name}</span>
                </div>
              </div>
              
              <div class="node-readings">
                ${readingsHtml || '<div style="flex:1; text-align:center; color:#64748b; font-size:13px; padding:12px;">No active sensors</div>'}
              </div>

              <div class="node-footer">
                <div class="node-footer-left">
                  <div class="footer-metric">
                    ${getRssiIcon(node.rssi)}
                    RSSI: <b>${node.rssi} dBm</b> <span class="radio-badge rssi-${getRssiLabelClass(node.rssi)}">${getRssiLabelText(node.rssi)}</span>
                  </div>
                  <div class="footer-metric">
                    ${getSnrIcon(node.snr)}
                    SNR: <b>${node.snr !== undefined ? node.snr.toFixed(1) : '--'} dB</b> <span class="radio-badge snr-${getSnrLabelClass(node.snr)}">${getSnrLabelText(node.snr)}</span>
                  </div>
                </div>
                <div class="node-footer-right">
                  <div class="footer-metric right-aligned">
                    <span>Lost: <b style="color: ${lossColor}">${lostCount} (${lossPercentStr} %)</b></span>
                    <span class="stat-divider">·</span>
                    <span>Rbts: <b style="color: ${node.reboots > 0 ? '#fbbf24' : '#64748b'}">${node.reboots}</b></span>
                  </div>
                  <div class="status-indicator right-aligned">
                    <span class="dot ${dotClass}"></span>
                    <span>Seen ${lastSeenText}${node.last_reset_reason !== 0 ? ` · Boot: <span style="color: ${getResetReasonColor(node.last_reset_reason)}; font-weight: 700;">${getResetReasonLabel(node.last_reset_reason)}</span>` : ''}</span>
                  </div>
                </div>
              </div>`;

          if (existingCard) {
            existingCard.className = `node-card ${statusClass}`;
            existingCard.style.cssText = isOnline ? `--card-border: ${theme.border}; --card-border-hover: ${theme.hoverBorder}; --card-glow: ${theme.glow};` : '';
            if (existingCard.innerHTML !== cardInnerHtml) {
              existingCard.innerHTML = cardInnerHtml;
            }
          } else {
            const cardEl = document.createElement('div');
            cardEl.id = cardId;
            cardEl.className = `node-card ${statusClass}`;
            if (isOnline) {
              cardEl.style.cssText = `--card-border: ${theme.border}; --card-border-hover: ${theme.hoverBorder}; --card-glow: ${theme.glow};`;
            }
            cardEl.innerHTML = cardInnerHtml;
            nodesContainer.appendChild(cardEl);
          }
        });
      } catch (error) {
        console.error('Error fetching data:', error);
      }
    };

    updateData();
    setInterval(updateData, 1000);
  </script>
</body>

</html>
